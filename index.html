<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>+1 -1 // Sayı Tahmin Oyunu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Mobil cihazlarda istenmeyen tarayıcı hareketlerini sıfırlama */
        html, body {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            -webkit-text-size-adjust: 100%;
        }
        body {
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 flex items-center justify-center h-full w-full p-0 select-none m-0">

    <div class="w-full max-w-md h-full flex flex-col justify-between bg-slate-900 px-4 py-3 shadow-2xl relative overflow-hidden pb-safe pt-safe">
        
        <div id="start-menu-modal" class="absolute inset-0 bg-slate-950/90 backdrop-blur-xl flex items-center justify-center p-4 z-50 transition-all duration-300">
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl w-full max-w-sm text-center shadow-2xl space-y-5">
                <div>
                    <h2 class="text-3xl font-black tracking-tight bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent mb-1">+1 -1</h2>
                    <p class="text-xs text-slate-400">Zorluk seviyesini seç ve serüvene başla</p>
                </div>

                <div class="bg-slate-800/50 p-3 rounded-2xl border border-slate-800 text-sm flex justify-around font-mono">
                    <div>🏆 Seviye: <span id="menu-level-text" class="text-amber-400 font-bold">1</span></div>
                    <div>💰 Puan: <span id="menu-score-text" class="text-emerald-400 font-bold">0</span></div>
                </div>

                <div class="space-y-3">
                    <button onclick="selectDifficulty('basic')" class="w-full text-left bg-slate-800/60 hover:bg-slate-800 p-4 rounded-2xl border border-slate-700/50 flex justify-between items-center transition-all cursor-pointer group active:scale-98">
                        <div>
                            <span class="block text-emerald-400 font-bold text-base">Basic</span>
                            <span class="text-[11px] text-slate-400">3 Basamak (1-6 Rakamları), Süresiz</span>
                        </div>
                        <i class="fa-solid fa-seedling text-emerald-400 text-lg"></i>
                    </button>

                    <button onclick="selectDifficulty('medium')" class="w-full text-left bg-slate-800/60 hover:bg-slate-800 p-4 rounded-2xl border border-slate-700/50 flex justify-between items-center transition-all cursor-pointer group active:scale-98">
                        <div>
                            <span class="block text-amber-400 font-bold text-base">Medium</span>
                            <span class="text-[11px] text-slate-400">4 Basamak (1-9 Rakamları), Süresiz</span>
                        </div>
                        <i class="fa-solid fa-chess-knight text-amber-400 text-lg"></i>
                    </button>

                    <button onclick="selectDifficulty('pro')" class="w-full text-left bg-slate-800/60 hover:bg-slate-800 p-4 rounded-2xl border border-slate-700/50 flex justify-between items-center transition-all cursor-pointer group active:scale-98">
                        <div>
                            <span class="block text-rose-500 font-bold text-base">Pro</span>
                            <span class="text-[11px] text-slate-400">4 Basamak, 60s Süreli, Max 10 Hamle!</span>
                        </div>
                        <i class="fa-solid fa-fire text-rose-500 text-lg"></i>
                    </button>
                </div>
            </div>
        </div>

        <header class="h-12 flex justify-between items-center shrink-0">
            <button onclick="showStartMenu()" class="bg-slate-800 active:scale-95 text-slate-300 px-3 py-1.5 rounded-xl border border-slate-700 text-xs font-bold transition-all cursor-pointer flex items-center gap-1">
                <i class="fa-solid fa-arrow-left text-[10px]"></i> Menü
            </button>
            
            <div class="flex items-center gap-1.5 font-mono text-[11px]">
                <div id="badge-level" class="bg-slate-800 px-2 py-1 rounded-lg border border-slate-700 text-amber-400 font-bold">LVL 1</div>
                <div class="bg-slate-800 px-2 py-1 rounded-lg border border-slate-700 text-emerald-400 font-bold">💰 <span id="top-score-text">0</span></div>

                <div id="timer-box" class="bg-slate-800 px-2 py-1 rounded-lg border border-slate-700 hidden items-center gap-1">
                    <i class="fa-solid fa-stopwatch text-rose-400"></i> 
                    <span id="timer-text" class="font-bold text-rose-400">60s</span>
                </div>

                <div class="bg-slate-800 px-2 py-1 rounded-lg border border-slate-700">
                    <span id="move-text-container"><span id="move-text">0</span></span>
                </div>
            </div>
        </header>

        <main id="history-container" class="flex-1 my-2 overflow-y-auto space-y-2.5 pr-0.5 min-h-0">
            </main>

        <footer class="shrink-0 space-y-3 pb-2 bg-slate-900 pt-2 border-t border-slate-800/40">
            
            <div id="cells-wrapper" class="flex justify-center gap-3"></div>

            <p class="text-[10px] text-center text-slate-500 font-medium">💡 Taktik: Rakamlara <span class="text-amber-500 font-bold">basılı tutarak</span> renklerini değiştirebilirsin.</p>

            <div id="keyboard-container" class="space-y-2"></div>
        </footer>

        <div id="game-over-modal" class="hidden absolute inset-0 bg-slate-950/95 backdrop-blur-md flex items-center justify-center p-4 z-50">
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl w-full max-w-sm text-center shadow-2xl space-y-5">
                <div id="modal-icon-container" class="w-14 h-14 mx-auto rounded-full bg-emerald-500/10 flex items-center justify-center text-2xl text-emerald-400">
                    <i id="modal-icon-main" class="fa-solid fa-trophy"></i>
                </div>
                
                <div>
                    <h2 id="modal-title" class="text-2xl font-black text-emerald-400">Tebrikler!</h2>
                    <p id="modal-subtitle" class="text-xs text-slate-400 mt-1">-</p>
                </div>

                <div class="grid grid-cols-2 gap-3 font-mono text-xs">
                    <div class="bg-slate-800/60 p-2.5 rounded-2xl border border-slate-800">
                        <span class="block text-lg font-black text-amber-400 capitalize" id="modal-diff-text">-</span>
                        <span class="text-[9px] text-slate-500 uppercase font-bold">Zorluk</span>
                    </div>
                    <div class="bg-slate-800/60 p-2.5 rounded-2xl border border-slate-800">
                        <span class="block text-lg font-black text-orange-400" id="modal-moves">0</span>
                        <span class="text-[9px] text-slate-500 uppercase font-bold" id="modal-moves-label">Hamle</span>
                    </div>
                </div>

                <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-800/80 space-y-2 font-mono text-xs text-left">
                    <div class="flex justify-between">
                        <span class="text-slate-400">Zorluk Modu:</span>
                        <span class="font-bold text-white uppercase" id="modal-diff-spec">-</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-400">Geçen Toplam Süre:</span>
                        <span class="font-bold text-sky-400" id="modal-total-time-spent">0s</span>
                    </div>
                    <div id="modal-puan-detay" class="space-y-1 pt-2 border-t border-slate-800">
                        <div class="flex justify-between text-amber-400">
                            <span>🎯 Tahmin Puanı:</span>
                            <span id="puan-tahmin">+0</span>
                        </div>
                        <div class="flex justify-between text-sky-400">
                            <span>⏱️ Zaman Puanı:</span>
                            <span id="puan-zaman">+0</span>
                        </div>
                        <div class="flex justify-between text-emerald-400 text-xs font-black pt-1 border-t border-dashed border-slate-700">
                            <span>🎉 Toplam Puan:</span>
                            <span id="puan-toplam">+0</span>
                        </div>
                    </div>
                </div>

                <button onclick="nextLevelOrRestart()" id="modal-action-btn" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-slate-950 font-black py-3 rounded-xl text-base shadow-lg shadow-orange-500/20 active:scale-95 transition-all cursor-pointer">
                    Sonraki Seviye <i class="fa-solid fa-forward ml-1 text-xs"></i>
                </button>
            </div>
        </div>

    </div>

    <script>
        let playerStats = { level: 1, score: 0 };

        if (localStorage.getItem("plusMinus_playerStats")) {
            playerStats = JSON.parse(localStorage.getItem("plusMinus_playerStats"));
        }

        const MAX_LEVELS = 3024; 
        let currentDifficulty = 'medium'; 
        let maxDigits = 4;
        let allowedPool = [];
        let currentGuess = [];
        let gizliSayi = "";
        let movesCount = 0;
        let timerInterval = null;
        let timeLeft = 60;
        let totalSecondsSpent = 0; 
        let isGameActive = false;
        let lastResultWin = false;

        let analysis = { zero: 0, minus: 0, plus: 0, mixed: 0 };

        function saveStats() {
            localStorage.setItem("plusMinus_playerStats", JSON.stringify(playerStats));
        }

        function updateMenuData() {
            document.getElementById("menu-level-text").innerText = playerStats.level;
            document.getElementById("menu-score-text").innerText = playerStats.score;
            document.getElementById("top-score-text").innerText = playerStats.score;
            document.getElementById("badge-level").innerText = `LVL ${playerStats.level}`;
        }

        function showStartMenu() {
            document.getElementById("game-over-modal").classList.add("hidden");
            document.getElementById("start-menu-modal").classList.remove("hidden");
            if (timerInterval) clearInterval(timerInterval);
            isGameActive = false;
            updateMenuData();
        }

        function selectDifficulty(diff) {
            currentDifficulty = diff;
            document.getElementById("start-menu-modal").classList.add("hidden");
            
            if (diff === 'basic') {
                maxDigits = 3;
                allowedPool = ["1","2","3","4","5","6"];
            } else {
                maxDigits = 4;
                allowedPool = ["1","2","3","4","5","6","7","8","9"];
            }
            initGame();
        }

        function initGame() {
            updateMenuData();
            buildUIElements();

            gizliSayi = rastgeleSayiUret();
            console.log(`🔒 Gizli Sayı (${currentDifficulty}):`, gizliSayi);

            currentGuess = [];
            movesCount = 0;
            totalSecondsSpent = 0;
            analysis = { zero: 0, minus: 0, plus: 0, mixed: 0 };
            isGameActive = true;

            updateMoveText();

            document.getElementById("history-container").innerHTML = `
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-slate-500 text-xs italic">
                    <i class="fa-solid fa-flag text-2xl mb-2 text-slate-700"></i>
                    Seviye ${playerStats.level} Başladı! Tahminini yap.
                </div>`;

            setupTimer();
        }

        function buildUIElements() {
            const wrapper = document.getElementById("cells-wrapper");
            wrapper.innerHTML = "";
            for (let i = 0; i < maxDigits; i++) {
                wrapper.innerHTML += `<div id="cell-${i}" class="w-12 h-12 bg-slate-800 border-2 border-slate-700 rounded-xl flex items-center justify-center text-xl font-black font-mono text-amber-400 transition-all shadow-inner"></div>`;
            }

            const kbContainer = document.getElementById("keyboard-container");
            kbContainer.innerHTML = "";

            if (currentDifficulty === 'basic') {
                kbContainer.innerHTML = `
                    <div class="grid grid-cols-6 gap-1.5">
                        ${[1,2,3,4,5,6].map(n => `<button id="key-${n}" class="h-12 bg-slate-800 border border-slate-700 rounded-xl font-bold text-lg active:scale-95 transition-all text-slate-100 select-none">${n}</button>`).join('')}
                    </div>
                    <div class="grid grid-cols-2 gap-3 pt-0.5">
                        <button id="btn-del" class="h-11 bg-slate-700 text-slate-300 rounded-xl font-bold flex items-center justify-center active:scale-95 transition-all"><i class="fa-solid fa-delete-left text-base"></i></button>
                        <button id="btn-sub" class="h-11 bg-amber-500 text-slate-950 rounded-xl font-black flex items-center justify-center active:scale-95 transition-all shadow-lg shadow-amber-500/10"><i class="fa-solid fa-paper-plane text-base"></i></button>
                    </div>
                `;
            } else {
                kbContainer.innerHTML = `
                    <div class="grid grid-cols-5 gap-1.5">
                        ${[1,2,3,4,5].map(n => `<button id="key-${n}" class="h-12 bg-slate-800 border border-slate-700 rounded-xl font-bold text-lg active:scale-95 transition-all text-slate-100 select-none">${n}</button>`).join('')}
                    </div>
                    <div class="grid grid-cols-6 gap-1.5">
                        ${[6,7,8,9].map(n => `<button id="key-${n}" class="h-12 bg-slate-800 border border-slate-700 rounded-xl font-bold text-lg active:scale-95 transition-all text-slate-100 select-none">${n}</button>`).join('')}
                        <button id="btn-del" class="h-12 bg-slate-700 text-slate-300 rounded-xl font-bold flex items-center justify-center active:scale-95 transition-all"><i class="fa-solid fa-delete-left text-base"></i></button>
                        <button id="btn-sub" class="h-12 bg-amber-500 text-slate-950 rounded-xl font-black flex items-center justify-center active:scale-95 transition-all shadow-lg shadow-amber-500/10"><i class="fa-solid fa-paper-plane text-base"></i></button>
                    </div>
                `;
            }
            bindTouchControls();
        }

        function rastgeleSayiUret() {
            let pool = [...allowedPool];
            let sonuc = "";
            for (let i = 0; i < maxDigits; i++) {
                let rIdx = Math.floor(Math.random() * pool.length);
                sonuc += pool[rIdx];
                pool.splice(rIdx, 1);
            }
            return sonuc;
        }

        function setupTimer() {
            if (timerInterval) clearInterval(timerInterval);
            const timerBox = document.getElementById("timer-box");

            if (currentDifficulty === 'pro') {
                timeLeft = 60;
                document.getElementById("timer-text").innerText = "60s";
                timerBox.classList.remove("hidden");
                timerBox.classList.add("flex");

                timerInterval = setInterval(() => {
                    if (!isGameActive) return;
                    timeLeft--;
                    totalSecondsSpent++;
                    document.getElementById("timer-text").innerText = `${timeLeft}s`;
                    
                    if (timeLeft <= 0) {
                        endGame(false, "Zaman Aşımı!");
                    }
                }, 1000);
            } else {
                timerBox.classList.remove("flex");
                timerBox.classList.add("hidden");
                
                timerInterval = setInterval(() => {
                    if (isGameActive) totalSecondsSpent++;
                }, 1000);
            }
        }

        function updateMoveText() {
            const container = document.getElementById("move-text-container");
            if (currentDifficulty === 'pro') {
                container.innerHTML = `Kalan: <span class="font-bold text-rose-500">${10 - movesCount}</span>`;
            } else {
                container.innerHTML = `Hamle: <span class="font-bold text-orange-400">${movesCount}</span>`;
            }
        }

        function inputDigit(digit) {
            if (!isGameActive || currentGuess.length >= maxDigits) return;
            if (currentGuess.includes(digit)) {
                triggerCellShake();
                return;
            }
            currentGuess.push(digit);
            updateInputCells();
        }

        function deleteDigit() {
            if (!isGameActive || currentGuess.length === 0) return;
            currentGuess.pop();
            updateInputCells();
        }

        function updateInputCells() {
            for (let i = 0; i < maxDigits; i++) {
                const cell = document.getElementById(`cell-${i}`);
                if (currentGuess[i]) {
                    cell.innerText = currentGuess[i];
                    cell.classList.add("border-amber-500", "scale-105");
                } else {
                    cell.innerText = "";
                    cell.classList.remove("border-amber-500", "scale-105");
                }
            }
        }

        function submitGuess() {
            if (!isGameActive || currentGuess.length !== maxDigits) {
                triggerCellShake();
                return;
            }

            const emptyState = document.getElementById("empty-state");
            if (emptyState) emptyState.style.display = "none";

            movesCount++;
            updateMoveText();

            const tahminStr = currentGuess.join("");
            let artiSkor = 0;
            let eksiSkor = 0;

            for (let i = 0; i < maxDigits; i++) {
                if (tahminStr[i] === gizliSayi[i]) {
                    artiSkor++;
                } else if (gizliSayi.includes(tahminStr[i])) {
                    eksiSkor++;
                }
            }

            renderHistoryRow(tahminStr, artiSkor, eksiSkor);
            
            if (artiSkor === maxDigits) {
                endGame(true);
                currentGuess = [];
                updateInputCells();
                return;
            } 
            
            if (currentDifficulty === 'pro' && movesCount >= 10) {
                endGame(false, "Hamle Sınırı!");
                currentGuess = [];
                updateInputCells();
                return;
            }

            if (currentDifficulty === 'pro') {
                timeLeft = 60;
                document.getElementById("timer-text").innerText = "60s";
            }

            currentGuess = [];
            updateInputCells();
        }

        function renderHistoryRow(tahmin, arti, eksi) {
            const container = document.getElementById("history-container");
            const row = document.createElement("div");
            row.className = "flex items-center justify-between bg-slate-800/40 border border-slate-800/80 p-2 rounded-2xl shadow-md shrink-0";

            let cellsHtml = `<div class="flex gap-1">`;
            for(let i=0; i<maxDigits; i++) {
                cellsHtml += `<div class="w-8 h-8 bg-slate-800 rounded-lg border border-slate-700 flex items-center justify-center font-mono font-bold text-base text-slate-200">${tahmin[i]}</div>`;
            }
            cellsHtml += `</div>`;

            let badgeHtml = `<div class="flex gap-1 font-mono text-xs font-black">`;
            if (arti === 0 && eksi === 0) {
                badgeHtml += `<span class="px-2 py-0.5 rounded-md bg-slate-800 text-slate-500 border border-slate-700/50">0</span>`;
            } else {
                if (eksi > 0) badgeHtml += `<span class="px-2 py-0.5 rounded-md bg-red-500/10 text-red-400 border border-red-500/20">-${eksi}</span>`;
                if (arti > 0) badgeHtml += `<span class="px-2 py-0.5 rounded-md bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">+${arti}</span>`;
            }
            badgeHtml += `</div>`;

            row.innerHTML = cellsHtml + badgeHtml;
            container.insertBefore(row, container.firstChild);
        }

        function endGame(isWin, reason = "") {
            isGameActive = false;
            if (timerInterval) clearInterval(timerInterval);
            lastResultWin = isWin;

            const modalTitle = document.getElementById("modal-title");
            const modalSubtitle = document.getElementById("modal-subtitle");
            const iconContainer = document.getElementById("modal-icon-container");
            const iconMain = document.getElementById("modal-icon-main");
            const actionBtn = document.getElementById("modal-action-btn");
            const yuanDetayNode = document.getElementById("modal-puan-detay");

            document.getElementById("modal-diff-text").innerText = currentDifficulty;
            document.getElementById("modal-diff-spec").innerText = currentDifficulty;
            document.getElementById("modal-moves").innerText = movesCount;
            document.getElementById("modal-total-time-spent").innerText = `${totalSecondsSpent}s`;

            if (isWin) {
                let tahminPuani = 160 - ((movesCount - 1) * 10);
                if (tahminPuani < 0) tahminPuani = 0;

                let tabanZamanHavuzu = 600; 
                let harcananOnSaniye = Math.floor(totalSecondsSpent / 10);
                let zamanPuani = Math.max(0, 60 - harcananOnSaniye);

                let toplamKazanilanPuan = tahminPuani + zamanPuani;

                playerStats.score += toplamKazanilanPuan;
                saveStats();

                document.getElementById("puan-tahmin").innerText = `+${tahminPuani}`;
                document.getElementById("puan-zaman").innerText = `+${zamanPuani}`;
                document.getElementById("puan-toplam").innerText = `+${toplamKazanilanPuan}`;
                yuanDetayNode.style.display = "block";

                modalTitle.innerText = "Başarılı!";
                modalTitle.className = "text-xl font-black text-emerald-400";
                modalSubtitle.innerText = `Sayıyı çözdün!`;
                iconContainer.className = "w-12 h-12 mx-auto rounded-full bg-emerald-500/10 flex items-center justify-center text-xl text-emerald-400";
                iconMain.className = "fa-solid fa-circle-check";
                actionBtn.innerHTML = `Sonraki Seviye <i class="fa-solid fa-forward ml-1 text-xs"></i>`;
            } else {
                yuanDetayNode.style.display = "none";
                modalTitle.innerText = "Başaramadın!";
                modalTitle.className = "text-xl font-black text-red-500";
                modalSubtitle.innerText = `Gizli Sayı: ${gizliSayi}`;
                iconContainer.className = "w-12 h-12 mx-auto rounded-full bg-red-500/10 flex items-center justify-center text-xl text-red-400";
                iconMain.className = "fa-solid fa-triangle-exclamation";
                actionBtn.innerHTML = `Tekrar Dene <i class="fa-solid fa-rotate-right ml-1 text-xs"></i>`;
            }

            document.getElementById("game-over-modal").classList.remove("hidden");
        }

        function nextLevelOrRestart() {
            document.getElementById("game-over-modal").classList.add("hidden");
            if (lastResultWin) {
                if (playerStats.level < MAX_LEVELS) playerStats.level++;
                else playerStats.level = 1;
                saveStats();
            }
            initGame();
        }

        function triggerCellShake() {
            for (let i = 0; i < maxDigits; i++) {
                const cell = document.getElementById(`cell-${i}`);
                if(cell) {
                    cell.classList.add("animate-pulse", "border-red-500");
                    setTimeout(() => cell.classList.remove("animate-pulse", "border-red-500"), 200);
                }
            }
        }

        // 📱 MOBİL OYUN KONTROLLERİ (UZUN BASMA - TOUCH GÜVENLİ)
        function bindTouchControls() {
            // Silme ve Gönderme tetikleyicileri
            document.getElementById("btn-del").addEventListener("touchstart", (e) => { e.preventDefault(); deleteDigit(); });
            document.getElementById("btn-sub").addEventListener("touchstart", (e) => { e.preventDefault(); submitGuess(); });

            // Rakamlar için Touch / Basılı Tutma Takibi
            allowedPool.forEach(n => {
                const key = document.getElementById(`key-${n}`);
                if (!key) return;
                key.clickState = 0;

                let touchStartTime = 0;
                let touchTimer = null;
                let isLongPress = false;

                // Tıklama Başlangıcı
                key.addEventListener("touchstart", (e) => {
                    e.preventDefault();
                    isLongPress = false;
                    touchStartTime = Date.now();
                    
                    // 500ms sonra Uzun Basmayı tetikle
                    touchTimer = setTimeout(() => {
                        isLongPress = true;
                        triggerLongPress(key, n);
                    }, 400);
                });

                // Tıklama Bitişi
                key.addEventListener("touchend", (e) => {
                    e.preventDefault();
                    clearTimeout(touchTimer);
                    
                    // Eğer basılı tutulmadıysa normal dokunmadır (Yazı yazar)
                    if (!isLongPress && (Date.now() - touchStartTime < 400)) {
                        inputDigit(n);
                    }
                });
            });
        }

        // Uzun basma olunca rengi değiştir (Strateji Modu)
        function triggerLongPress(key, digit) {
            if (!isGameActive) return;
            key.clickState = (key.clickState + 1) % 3;
            
            key.className = "h-12 border rounded-xl font-bold text-lg active:scale-95 transition-all text-slate-100 select-none";
            
            if (key.clickState === 1) {
                key.classList.add("bg-red-950/90", "text-red-300", "line-through", "border-red-700");
            } else if (key.clickState === 2) {
                key.classList.add("bg-emerald-700", "border-emerald-500", "text-white font-black");
            } else {
                key.classList.add("bg-slate-800", "border-slate-700");
            }

            // Telefonda küçük bir titreşim efekti simülasyonu (Destekleyen cihazlarda)
            if (navigator.vibrate) navigator.vibrate(40);
        }

        window.onload = showStartMenu;
    </script>
</body>
</html>
