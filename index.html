<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>+1 -1 // Sayı Tahmin Oyunu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        html, body { overflow: hidden; position: fixed; width: 100%; height: 100%; -webkit-text-size-adjust: 100%; }
        body { -webkit-tap-highlight-color: transparent; touch-action: none; }
        
        /* 🎨 DİNAMİK TEMA SINIFLARI */
        .theme-dark { --bg-main: #0f172a; --bg-card: #1e293b; --bg-kb: #0f172a; --text-main: #f8fafc; --text-muted: #94a3b8; --border-color: #334155; }
        .theme-light { --bg-main: #f1f5f9; --bg-card: #ffffff; --bg-kb: #e2e8f0; --text-main: #0f172a; --text-muted: #64748b; --border-color: #cbd5e1; }

        .key-neutral { background-color: var(--bg-card) !important; color: var(--text-main) !important; border-color: var(--border-color) !important; text-decoration: none !important; font-weight: bold !important; }
        .key-red { background-color: #7f1d1d !important; color: #fca5a5 !important; border-color: #b91c1c !important; text-decoration: line-through !important; font-weight: bold !important; }
        .key-green { background-color: #047857 !important; color: #ffffff !important; border-color: #10b981 !important; text-decoration: none !important; font-weight: 900 !important; }
    </style>
</head>
<body class="flex items-center justify-center h-full w-full p-0 select-none m-0 transition-colors duration-300">

    <div id="main-container" class="theme-dark w-full max-w-md h-full flex flex-col justify-between p-4 shadow-2xl relative overflow-hidden pb-safe pt-safe transition-colors duration-300" style="background-color: var(--bg-main); color: var(--text-main);">
        
        <div id="start-menu-modal" class="absolute inset-0 bg-slate-950/90 backdrop-blur-xl flex items-center justify-center p-4 z-50 transition-all duration-300">
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl w-full max-w-sm text-center shadow-2xl space-y-5 animate-fade-in">
                <div>
                    <h2 class="text-3xl font-black tracking-tight bg-gradient-to-r from-amber-400 to-orange-500 bg-clip-text text-transparent mb-1">+1 -1</h2>
                    <p class="text-xs text-slate-400">Zorluk seviyesini seç ve serüvene başla</p>
                </div>

                <div class="bg-slate-800/60 p-4 rounded-2xl border border-slate-700/60 text-xs flex flex-col items-center gap-3 text-white font-mono">
                    <div class="flex items-center gap-3 bg-slate-900/40 p-2.5 rounded-xl w-full justify-center border border-slate-800">
                        <div class="w-12 h-12 rounded-full border border-amber-500/30 overflow-hidden bg-slate-950 flex items-center justify-center">
                            <span id="menu-avatar-emoji" class="text-2xl">👤</span>
                            <img id="menu-avatar-img" src="" class="hidden w-full h-full object-cover">
                        </div>
                        <div class="text-left">
                            <span class="block text-[10px] text-slate-400 uppercase tracking-wider font-bold">Mevcut Unvan</span>
                            <span id="menu-rank-name" class="font-black text-amber-400 text-sm">Çömez</span>
                        </div>
                    </div>
                    <div class="flex justify-around w-full pt-1">
                        <div>🏆 Seviye: <span id="menu-level-text" class="text-amber-400 font-bold">1</span></div>
                        <div>💰 Puan: <span id="menu-score-text" class="text-emerald-400 font-bold">0</span></div>
                    </div>
                </div>

                <div class="space-y-3">
                    <button onclick="selectDifficulty('basic')" class="w-full text-left bg-slate-800/60 hover:bg-slate-800 p-3.5 rounded-2xl border border-slate-700/50 flex justify-between items-center transition-all cursor-pointer text-white">
                        <div><span class="block text-emerald-400 font-bold text-sm">Basic</span><span class="text-[10px] text-slate-400">3 Basamak (1-6 Rakamları), Süresiz</span></div>
                        <i class="fa-solid fa-seedling text-emerald-400 text-base"></i>
                    </button>
                    <button onclick="selectDifficulty('medium')" class="w-full text-left bg-slate-800/60 hover:bg-slate-800 p-3.5 rounded-2xl border border-slate-700/50 flex justify-between items-center transition-all cursor-pointer text-white">
                        <div><span class="block text-amber-400 font-bold text-sm">Medium</span><span class="text-[10px] text-slate-400">4 Basamak (1-9 Rakamları), Süresiz</span></div>
                        <i class="fa-solid fa-chess-knight text-amber-400 text-base"></i>
                    </button>
                    <button onclick="selectDifficulty('pro')" class="w-full text-left bg-slate-800/60 hover:bg-slate-800 p-3.5 rounded-2xl border border-slate-700/50 flex justify-between items-center transition-all cursor-pointer text-white">
                        <div>
                            <span class="block text-rose-500 font-bold text-sm">Pro (Dinamik Zorluk)</span>
                            <span id="pro-desc-text" class="text-[10px] text-rose-300">-</span>
                        </div>
                        <i class="fa-solid fa-fire text-rose-500 text-base"></i>
                    </button>
                </div>
            </div>
        </div>

        <header class="h-12 flex justify-between items-center shrink-0 gap-1">
            <div class="flex gap-1.5 items-center">
                <button onclick="showStartMenu()" class="px-2.5 py-1.5 rounded-xl text-[11px] font-bold transition-all cursor-pointer flex items-center gap-1 shadow-sm" style="background-color: var(--bg-card); border: 1px solid var(--border-color);">
                    <i class="fa-solid fa-arrow-left text-[9px]"></i> Menü
                </button>
                <button onclick="toggleTheme()" class="px-2.5 py-1.5 rounded-xl text-[11px] font-bold transition-all cursor-pointer flex items-center justify-center shadow-sm" style="background-color: var(--bg-card); border: 1px solid var(--border-color);">
                    <i id="theme-btn-icon" class="fa-solid fa-sun text-amber-400"></i>
                </button>
                
                <div id="top-profile-badge" class="px-2 py-1 rounded-xl text-[10px] font-bold flex items-center gap-1.5 max-w-[130px] truncate" style="background-color: var(--bg-card); border: 1px solid var(--border-color);">
                    <div class="w-6 h-6 rounded-full border border-slate-700/50 flex items-center justify-center overflow-hidden bg-slate-950/40 shrink-0">
                        <span id="top-avatar-emoji" class="text-xs">👤</span>
                        <img id="top-avatar-img" src="" class="hidden w-full h-full object-cover">
                    </div>
                    <span id="top-rank-name" class="truncate">Çömez</span>
                </div>
            </div>
            
            <div class="flex items-center gap-1 font-mono text-[10px]">
                <div id="badge-level" class="px-1.5 py-1 rounded-lg font-bold" style="background-color: var(--bg-card); border: 1px solid var(--border-color);">LVL 1</div>
                <div class="px-1.5 py-1 rounded-lg font-bold text-emerald-500" style="background-color: var(--bg-card); border: 1px solid var(--border-color);">💰 <span id="top-score-text">0</span></div>

                <div id="timer-box" class="px-1.5 py-1 rounded-lg hidden items-center gap-1 font-bold text-rose-500" style="background-color: var(--bg-card); border: 1px solid var(--border-color);">
                    <i class="fa-solid fa-stopwatch text-rose-500"></i> <span id="timer-text">60s</span>
                </div>

                <div class="px-1.5 py-1 rounded-lg" style="background-color: var(--bg-card); border: 1px solid var(--border-color);">
                    <span id="move-text-container"><span id="move-text">0</span></span>
                </div>
            </div>
        </header>

        <div class="p-1.5 rounded-2xl flex justify-between items-center shrink-0 gap-1.5 text-[11px]" style="background-color: var(--bg-card); border: 1px solid var(--border-color);">
            <button onclick="useJoker('ele')" class="flex-1 py-1.5 px-1 rounded-xl text-center active:scale-95 transition-all cursor-pointer" style="background-color: var(--bg-main); border: 1px solid var(--border-color);">
                <span class="block font-bold">🔍 1 Rakam Ele</span>
                <span class="font-mono text-red-500 font-bold">100 Puan</span>
            </button>
            <button onclick="useJoker('fisilda')" class="flex-1 py-1.5 px-1 rounded-xl text-center active:scale-95 transition-all cursor-pointer" style="background-color: var(--bg-main); border: 1px solid var(--border-color);">
                <span class="block font-bold">💬 Rakam Bul</span>
                <span class="font-mono text-amber-500 font-bold">200 Puan</span>
            </button>
            <button onclick="useJoker('basamak')" class="flex-1 py-1.5 px-1 rounded-xl text-center active:scale-95 transition-all cursor-pointer" style="background-color: var(--bg-main); border: 1px solid var(--border-color);">
                <span class="block font-bold">🎯 Basamak Aç</span>
                <span class="font-mono text-emerald-500 font-bold">500 Puan</span>
            </button>
        </div>

        <main id="history-container" class="flex-1 my-2 overflow-y-auto space-y-2.5 pr-0.5 min-h-0">
            </main>

        <footer class="shrink-0 space-y-3 pb-2 pt-2 border-t" style="background-color: var(--bg-main); border-color: var(--border-color);">
            <div id="cells-wrapper" class="flex justify-center gap-3"></div>
            <p class="text-[10px] text-center font-medium" style="color: var(--text-muted);">💡 Taktik: Sayılara <span class="text-amber-500 font-bold">basılı tutarak</span> Kırmızı / Yeşil yapabilirsin.</p>
            <div id="keyboard-container" class="space-y-2"></div>
        </footer>

        <div id="game-over-modal" class="hidden absolute inset-0 bg-slate-950/95 backdrop-blur-md flex items-center justify-center p-4 z-50">
            <div class="bg-slate-900 text-white border border-slate-800 p-6 rounded-3xl w-full max-w-sm text-center shadow-2xl space-y-5">
                <div id="modal-icon-container" class="w-14 h-14 mx-auto rounded-full bg-emerald-500/10 flex items-center justify-center text-2xl text-emerald-400"><i id="modal-icon-main" class="fa-solid fa-trophy"></i></div>
                <div><h2 id="modal-title" class="text-2xl font-black text-emerald-400">Başarılı!</h2><p id="modal-subtitle" class="text-xs text-slate-400 mt-1">-</p></div>
                <div class="grid grid-cols-2 gap-3 font-mono text-xs text-white">
                    <div class="bg-slate-800/60 p-2.5 rounded-2xl border border-slate-800"><span class="block text-lg font-black text-amber-400 capitalize" id="modal-diff-text">-</span><span class="text-[9px] text-slate-500 uppercase font-bold">Zorluk</span></div>
                    <div class="bg-slate-800/60 p-2.5 rounded-2xl border border-slate-800"><span class="block text-lg font-black text-orange-400" id="modal-moves">0</span><span class="text-[9px] text-slate-500 uppercase font-bold">Hamle</span></div>
                </div>
                <div class="bg-slate-800/40 p-4 rounded-2xl border border-slate-800/80 space-y-2 font-mono text-xs text-left text-white">
                    <div class="flex justify-between"><span class="text-slate-400">Zorluk Modu:</span><span class="font-bold text-white uppercase" id="modal-diff-spec">-</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">Geçen Toplam Süre:</span><span class="font-bold text-sky-400" id="modal-total-time-spent">0s</span></div>
                    <div id="modal-puan-detay" class="space-y-1 pt-2 border-t border-slate-800">
                        <div class="flex justify-between text-amber-400"><span>🎯 Tahmin Puanı:</span><span id="puan-tahmin">+0</span></div>
                        <div class="flex justify-between text-sky-400"><span>⏱️ Zaman Puanı:</span><span id="puan-zaman">+0</span></div>
                        <div class="flex justify-between text-emerald-400 text-xs font-black pt-1 border-t border-dashed border-slate-700"><span>🎉 Toplam Puan:</span><span id="puan-toplam">+0</span></div>
                    </div>
                </div>
                <button onclick="nextLevelOrRestart()" id="modal-action-btn" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-slate-950 font-black py-3 rounded-xl text-base shadow-lg shadow-orange-500/20 active:scale-95 transition-all cursor-pointer">Sonraki Seviye <i class="fa-solid fa-forward ml-1 text-xs"></i></button>
            </div>
        </div>

    </div>

    <script>
        let playerStats = { level: 1, score: 0, theme: 'dark' };

        if (localStorage.getItem("plusMinus_playerStats")) {
            let loaded = JSON.parse(localStorage.getItem("plusMinus_playerStats"));
            playerStats.level = loaded.level || 1;
            playerStats.score = loaded.score || 0;
            playerStats.theme = loaded.theme || 'dark';
        }

        const MAX_LEVELS = 3024; 
        let currentDifficulty = 'medium'; 
        let maxDigits = 4;
        let allowedPool = [];
        let currentGuess = [];
        let gizliSayi = "";
        let movesCount = 0;
        let timerInterval = null;
        let timeLeft = 60;
        let maxProMoves = 10; 
        let totalSecondsSpent = 0; 
        let isGameActive = false;
        let lastResultWin = false;

        // 🧠 SİL SİL CİLA: YENİ RESİM YAPISI VE COK NET AYARLAR
        function getRankConfig(level) {
            if (level >= 21) {
                return { name: "Tetah Mara", isImg: true, file: "tetah_mara.png", maxMoves: 11, duration: 60 };
            } else if (level >= 13) {
                return { name: "Öklid", isImg: true, file: "oklid.png", maxMoves: 11, duration: 75 };
            } else if (level >= 8) {
                return { name: "Da Vinci", isImg: true, file: "davinci.png", maxMoves: 19, duration: 75 };
            } else if (level >= 5) {
                return { name: "Einstein", isImg: true, file: "einstein.png", maxMoves: 19, duration: 90 };
            } else if (level >= 3) {
                return { name: "Marie Curie", isImg: true, file: "mariecurie.png", maxMoves: 32, duration: 90 };
            } else if (level >= 2) {
                return { name: "Fibonacci", isImg: true, file: "fibonacci.png", maxMoves: 32, duration: 120 };
            } else {
                return { name: "Çömez", isImg: false, emoji: "👤", maxMoves: 53, duration: 200 };
            }
        }

        function saveStats() { localStorage.setItem("plusMinus_playerStats", JSON.stringify(playerStats)); }

        function updateMenuData() {
            document.getElementById("menu-level-text").innerText = playerStats.level;
            document.getElementById("menu-score-text").innerText = playerStats.score;
            document.getElementById("top-score-text").innerText = playerStats.score;
            document.getElementById("badge-level").innerText = `LVL ${playerStats.level}`;
            
            let config = getRankConfig(playerStats.level);
            document.getElementById("menu-rank-name").innerText = config.name;
            document.getElementById("top-rank-name").innerText = config.name;
            document.getElementById("pro-desc-text").innerText = `Maks ${config.maxMoves} Hamle / ${config.duration}s Süre!`;

            // Profil resmi mantık döngüsü (Menu ve Üst Bar için)
            const menuEmoji = document.getElementById("menu-avatar-emoji");
            const menuImg = document.getElementById("menu-avatar-img");
            const topEmoji = document.getElementById("top-avatar-emoji");
            const topImg = document.getElementById("top-avatar-img");

            if (config.isImg) {
                menuEmoji.classList.add("hidden");
                menuImg.classList.remove("hidden");
                menuImg.src = config.file;

                topEmoji.classList.add("hidden");
                topImg.classList.remove("hidden");
                topImg.src = config.file;
            } else {
                menuImg.classList.add("hidden");
                menuEmoji.classList.remove("hidden");
                menuEmoji.innerText = config.emoji;

                topImg.classList.add("hidden");
                topEmoji.classList.remove("hidden");
                topEmoji.innerText = config.emoji;
            }

            applyThemeUI();
        }

        function toggleTheme() {
            playerStats.theme = playerStats.theme === 'dark' ? 'light' : 'dark';
            saveStats();
            applyThemeUI();
        }

        function applyThemeUI() {
            const container = document.getElementById("main-container");
            const themeIcon = document.getElementById("theme-btn-icon");
            if (playerStats.theme === 'light') {
                container.className = container.className.replace("theme-dark", "theme-light");
                themeIcon.className = "fa-solid fa-moon text-indigo-500";
            } else {
                container.className = container.className.replace("theme-light", "theme-dark");
                themeIcon.className = "fa-solid fa-sun text-amber-400";
            }
        }

        function showStartMenu() {
            document.getElementById("game-over-modal").classList.add("hidden");
            document.getElementById("start-menu-modal").classList.remove("hidden");
            if (timerInterval) clearInterval(timerInterval);
            isGameActive = false;
            updateMenuData();
        }

        function selectDifficulty(diff) {
            currentDifficulty = diff;
            document.getElementById("start-menu-modal").classList.add("hidden");
            if (diff === 'basic') { maxDigits = 3; allowedPool = ["1","2","3","4","5","6"]; }
            else { maxDigits = 4; allowedPool = ["1","2","3","4","5","6","7","8","9"]; }
            initGame();
        }

        function initGame() {
            updateMenuData();
            buildUIElements();
            gizliSayi = rastgeleSayiUret();
            console.log(`🔒 Gizli Sayı (${currentDifficulty}):`, gizliSayi);
            currentGuess = []; movesCount = 0; totalSecondsSpent = 0; isGameActive = true;
            
            let config = getRankConfig(playerStats.level);
            maxProMoves = config.maxMoves;
            timeLeft = config.duration;

            updateMoveText();
            document.getElementById("history-container").innerHTML = `
                <div id="empty-state" class="h-full flex flex-col items-center justify-center text-xs italic" style="color: var(--text-muted);">
                    <i class="fa-solid fa-flag text-2xl mb-2"></i>Seviye ${playerStats.level} Başladı! Tahminini yap.
                </div>`;
            setupTimer();
        }

        function buildUIElements() {
            const wrapper = document.getElementById("cells-wrapper");
            wrapper.innerHTML = "";
            for (let i = 0; i < maxDigits; i++) {
                wrapper.innerHTML += `<div id="cell-${i}" class="w-12 h-12 rounded-xl flex items-center justify-center text-xl font-black font-mono text-amber-500 transition-all shadow-inner" style="background-color: var(--bg-card); border: 2px solid var(--border-color);"></div>`;
            }

            const kbContainer = document.getElementById("keyboard-container");
            kbContainer.innerHTML = "";

            if (currentDifficulty === 'basic') {
                kbContainer.innerHTML = `
                    <div class="grid grid-cols-6 gap-1.5">
                        ${[1,2,3,4,5,6].map(n => `<button id="key-${n}" class="h-12 border rounded-xl font-bold text-lg active:scale-95 transition-all select-none key-neutral">${n}</button>`).join('')}
                    </div>
                    <div class="grid grid-cols-2 gap-3 pt-0.5">
                        <button id="btn-del" class="h-11 bg-slate-700 text-slate-300 rounded-xl font-bold flex items-center justify-center active:scale-95 transition-all"><i class="fa-solid fa-delete-left text-base"></i></button>
                        <button id="btn-sub" class="h-11 bg-amber-500 text-slate-950 rounded-xl font-black flex items-center justify-center active:scale-95 transition-all shadow-lg"><i class="fa-solid fa-paper-plane text-base"></i></button>
                    </div>
                `;
            } else {
                kbContainer.innerHTML = `
                    <div class="grid grid-cols-5 gap-1.5">
                        ${[1,2,3,4,5].map(n => `<button id="key-${n}" class="h-12 border rounded-xl font-bold text-lg active:scale-95 transition-all select-none key-neutral">${n}</button>`).join('')}
                    </div>
                    <div class="grid grid-cols-6 gap-1.5">
                        ${[6,7,8,9].map(n => `<button id="key-${n}" class="h-12 border rounded-xl font-bold text-lg active:scale-95 transition-all select-none key-neutral">${n}</button>`).join('')}
                        <button id="btn-del" class="h-12 bg-slate-700 text-slate-300 rounded-xl font-bold flex items-center justify-center active:scale-95 transition-all"><i class="fa-solid fa-delete-left text-base"></i></button>
                        <button id="btn-sub" class="h-12 bg-amber-500 text-slate-950 rounded-xl font-black flex items-center justify-center active:scale-95 transition-all shadow-lg"><i class="fa-solid fa-paper-plane text-base"></i></button>
                    </div>
                `;
            }
            bindTouchControls();
        }

        function rastgeleSayiUret() {
            let pool = [...allowedPool]; let sonuc = "";
            for (let i = 0; i < maxDigits; i++) { let rIdx = Math.floor(Math.random() * pool.length); sonuc += pool[rIdx]; pool.splice(rIdx, 1); }
            return sonuc;
        }

        function setupTimer() {
            if (timerInterval) clearInterval(timerInterval);
            const timerBox = document.getElementById("timer-box");
            if (currentDifficulty === 'pro') {
                document.getElementById("timer-text").innerText = `${timeLeft}s`;
                timerBox.classList.remove("hidden"); timerBox.classList.add("flex");
                timerInterval = setInterval(() => { 
                    if (!isGameActive) return; 
                    timeLeft--; 
                    totalSecondsSpent++; 
                    document.getElementById("timer-text").innerText = `${timeLeft}s`; 
                    if (timeLeft <= 0) endGame(false, "Zaman Aşımı!"); 
                }, 1000);
            } else {
                timerBox.classList.remove("flex"); timerBox.classList.add("hidden");
                timerInterval = setInterval(() => { if (isGameActive) totalSecondsSpent++; }, 1000);
            }
        }

        function updateMoveText() {
            const container = document.getElementById("move-text-container");
            container.innerHTML = currentDifficulty === 'pro' ? `Kalan: <span class="font-bold text-rose-500">${maxProMoves - movesCount}</span>` : `Hamle: <span class="font-bold text-orange-400">${movesCount}</span>`;
        }

        function inputDigit(digit) {
            if (!isGameActive || currentGuess.length >= maxDigits) return;
            if (currentGuess.includes(digit)) { triggerCellShake(); return; }
            currentGuess.push(digit); updateInputCells();
        }

        function deleteDigit() { if (!isGameActive || currentGuess.length === 0) return; currentGuess.pop(); updateInputCells(); }

        function updateInputCells() {
            for (let i = 0; i < maxDigits; i++) {
                const cell = document.getElementById(`cell-${i}`);
                if (currentGuess[i]) { cell.innerText = currentGuess[i]; cell.style.borderColor = "#f59e0b"; } 
                else { cell.innerText = ""; cell.style.borderColor = "var(--border-color)"; }
            }
        }

        function submitGuess() {
            if (!isGameActive || currentGuess.length !== maxDigits) { triggerCellShake(); return; }
            const emptyState = document.getElementById("empty-state"); if (emptyState) emptyState.style.display = "none";
            movesCount++; updateMoveText();
            const tahminStr = currentGuess.join(""); let artiSkor = 0; let eksiSkor = 0;
            for (let i = 0; i < maxDigits; i++) { if (tahminStr[i] === gizliSayi[i]) { artiSkor++; } else if (gizliSayi.includes(tahminStr[i])) { eksiSkor++; } }
            renderHistoryRow(tahminStr, artiSkor, eksiSkor);
            
            if (artiSkor === maxDigits) { endGame(true); currentGuess = []; updateInputCells(); return; } 
            if (currentDifficulty === 'pro' && movesCount >= maxProMoves) { endGame(false, "Hamle Sınırı!"); currentGuess = []; updateInputCells(); return; }
            
            if (currentDifficulty === 'pro') { 
                let config = getRankConfig(playerStats.level);
                timeLeft = config.duration; 
                document.getElementById("timer-text").innerText = `${timeLeft}s`; 
            }
            currentGuess = []; updateInputCells();
        }

        function renderHistoryRow(tahmin, arti, eksi) {
            const container = document.getElementById("history-container");
            const row = document.createElement("div");
            row.className = "flex items-center justify-between p-2 rounded-2xl shadow-md shrink-0 border transition-colors";
            row.style.backgroundColor = "var(--bg-card)";
            row.style.borderColor = "var(--border-color)";

            let cellsHtml = `<div class="flex gap-1">`;
            for(let i=0; i<maxDigits; i++) {
                cellsHtml += `<div class="w-8 h-8 rounded-lg flex items-center justify-center font-mono font-bold text-base" style="background-color: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-main);">${tahmin[i]}</div>`;
            }
            cellsHtml += `</div>`;

            let badgeHtml = `<div class="flex gap-1 font-mono text-xs font-black">`;
            if (arti === 0 && eksi === 0) { badgeHtml += `<span class="px-2 py-0.5 rounded-md bg-slate-500/10 text-slate-500 border border-slate-500/20">0</span>`; } 
            else {
                if (eksi > 0) badgeHtml += `<span class="px-2 py-0.5 rounded-md bg-red-500/10 text-red-400 border border-red-500/20">-${eksi}</span>`;
                if (arti > 0) badgeHtml += `<span class="px-2 py-0.5 rounded-md bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">+${arti}</span>`;
            }
            badgeHtml += `</div>`;
            row.innerHTML = cellsHtml + badgeHtml; container.insertBefore(row, container.firstChild);
        }

        function endGame(isWin, reason = "") {
            isGameActive = false; if (timerInterval) clearInterval(timerInterval); lastResultWin = isWin;
            const modalTitle = document.getElementById("modal-title"); const modalSubtitle = document.getElementById("modal-subtitle");
            const iconContainer = document.getElementById("modal-icon-container"); const iconMain = document.getElementById("modal-icon-main");
            const actionBtn = document.getElementById("modal-action-btn"); const yuanDetayNode = document.getElementById("modal-puan-detay");
            document.getElementById("modal-diff-text").innerText = currentDifficulty; document.getElementById("modal-diff-spec").innerText = currentDifficulty;
            document.getElementById("modal-moves").innerText = movesCount; document.getElementById("modal-total-time-spent").innerText = `${totalSecondsSpent}s`;

            if (isWin) {
                let tahminPuani = 160 - ((movesCount - 1) * 10); if (tahminPuani < 0) tahminPuani = 0;
                let harcananOnSaniye = Math.floor(totalSecondsSpent / 10); let zamanPuani = Math.max(0, 60 - harcananOnSaniye);
                let toplamKazanilanPuan = tahminPuani + zamanPuani;
                playerStats.score += toplamKazanilanPuan; saveStats();
                document.getElementById("puan-tahmin").innerText = `+${tahminPuani}`; document.getElementById("puan-zaman").innerText = `+${zamanPuani}`; document.getElementById("puan-toplam").innerText = `+${toplamKazanilanPuan}`;
                yuanDetayNode.style.display = "block"; modalTitle.innerText = "Başarılı!"; modalTitle.className = "text-xl font-black text-emerald-400";
                modalSubtitle.innerText = `Sayıyı çözdün!`; iconContainer.className = "w-12 h-12 mx-auto rounded-full bg-emerald-500/10 flex items-center justify-center text-xl text-emerald-400"; iconMain.className = "fa-solid fa-circle-check";
                actionBtn.innerHTML = `Sonraki Seviye <i class="fa-solid fa-forward ml-1 text-xs"></i>`;
            } else {
                yuanDetayNode.style.display = "none"; modalTitle.innerText = "Başaramadın!"; modalTitle.className = "text-xl font-black text-red-500";
                modalSubtitle.innerText = `Gizli Sayı: ${gizliSayi} (${reason})`; iconContainer.className = "w-12 h-12 mx-auto rounded-full bg-red-500/10 flex items-center justify-center text-xl text-red-400"; iconMain.className = "fa-solid fa-triangle-exclamation";
                actionBtn.innerHTML = `Tekrar Dene <i class="fa-solid fa-rotate-right ml-1 text-xs"></i>`;
            }
            document.getElementById("game-over-modal").classList.remove("hidden");
        }

        function nextLevelOrRestart() { document.getElementById("game-over-modal").classList.add("hidden"); if (lastResultWin) { if (playerStats.level < MAX_LEVELS) playerStats.level++; else playerStats.level = 1; saveStats(); } initGame(); }
        function triggerCellShake() { for (let i = 0; i < maxDigits; i++) { const cell = document.getElementById(`cell-${i}`); if(cell) { cell.classList.add("animate-pulse"); setTimeout(() => cell.classList.remove("animate-pulse"), 200); } } }

        function bindTouchControls() {
            document.getElementById("btn-del").addEventListener("touchstart", (e) => { e.preventDefault(); deleteDigit(); });
            document.getElementById("btn-sub").addEventListener("touchstart", (e) => { e.preventDefault(); submitGuess(); });

            allowedPool.forEach(n => {
                const key = document.getElementById(`key-${n}`); if (!key) return;
                key.clickState = 0; let touchStartTime = 0; let touchTimer = null; let isLongPress = false;

                key.addEventListener("touchstart", (e) => { e.preventDefault(); isLongPress = false; touchStartTime = Date.now(); touchTimer = setTimeout(() => { isLongPress = true; triggerLongPress(key, n); }, 400); });
                key.addEventListener("touchend", (e) => { e.preventDefault(); clearTimeout(touchTimer); if (!isLongPress && (Date.now() - touchStartTime < 400)) { inputDigit(n); } });
            });
        }

        // 🟢 KUSURSUZ UZUN BASMA DEVRESİ: (NÖTR -> KIRMIZI -> YEŞİL)
        function triggerLongPress(key, digit) {
            if (!isGameActive) return;
            key.clickState = (key.clickState + 1) % 3;
            key.classList.remove("key-neutral", "key-red", "key-green");
            
            if (key.clickState === 1) key.classList.add("key-red");
            else if (key.clickState === 2) key.classList.add("key-green");
            else key.classList.add("key-neutral");
            
            if (navigator.vibrate) navigator.vibrate(40);
        }

        function useJoker(type) {
            if (!isGameActive) return;
            if (type === 'ele') {
                if (playerStats.score < 100) { alert("Yetersiz Puan!"); return; }
                let olmayanlar = allowedPool.filter(n => !gizliSayi.includes(n)).filter(n => document.getElementById(`key-${n}`).clickState !== 1);
                if (olmayanlar.length === 0) { alert("Elenecek rakam kalmadı!"); return; }
                playerStats.score -= 100; saveStats(); updateMenuData();
                let secilen = olmayanlar[Math.floor(Math.random() * olmayanlar.length)];
                const key = document.getElementById(`key-${secilen}`); if (key) { key.clickState = 1; key.classList.remove("key-neutral", "key-green"); key.classList.add("key-red"); }
            } else if (type === 'fisilda') {
                if (playerStats.score < 200) { alert("Yetersiz Puan!"); return; }
                let buluncaklar = gizliSayi.split("").filter(n => document.getElementById(`key-${n}`).clickState !== 2);
                if (buluncaklar.length === 0) { alert("Tüm rakamları buldun!"); return; }
                playerStats.score -= 200; saveStats(); updateMenuData();
                let secilen = buluncaklar[Math.floor(Math.random() * buluncaklar.length)];
                const key = document.getElementById(`key-${secilen}`); if (key) { key.clickState = 2; key.classList.remove("key-neutral", "key-red"); key.classList.add("key-green"); }
                alert(`Fısıltı: Gizli sayıda "${secilen}" rakamı var!`);
            } else if (type === 'basamak') {
                if (playerStats.score < 500) { alert("Yetersiz Puan!"); return; }
                let acilmamis = []; for (let i = 0; i < maxDigits; i++) { if (document.getElementById(`cell-${i}`).innerText === "") acilmamis.push(i); }
                playerStats.score -= 500; saveStats(); updateMenuData();
                let targetIdx = acilmamis.length > 0 ? acilmamis[Math.floor(Math.random() * acilmamis.length)] : Math.floor(Math.random() * maxDigits);
                let tamRakam = gizliSayi[targetIdx]; let basamakAdi = ["1. Basamak", "2. Basamak", "3. Basamak", "4. Basamak"][targetIdx];
                const key = document.getElementById(`key-${tamRakam}`); if (key) { key.clickState = 2; key.classList.remove("key-neutral", "key-red"); key.classList.add("key-green"); }
                alert(`TAM İSABET! 👉 ${basamakAdi} rakamı: "${tamRakam}"`);
            }
        }
        window.onload = showStartMenu;
    </script>
